name: Fetch Live Data

on:
  schedule:
    # Every 24 hours at midnight UTC
    - cron: '0 0 * * *'
  # Manual trigger for testing
  workflow_dispatch:

jobs:
  fetch:
    name: Run data pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit JSON files back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a deploy key or PAT if you need to bypass branch protection;
          # for unprotected main branches GITHUB_TOKEN is sufficient.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data pipeline
        run: node scripts/fetch-all.js
        env:
          # Providing GITHUB_TOKEN raises the GitHub API rate limit from
          # 60 req/hour (unauthenticated) to 5000 req/hour.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/rss-signals.json \
                  public/data/github-signals.json \
                  public/data/review-signals.json \
                  public/data/last-updated.json
          # Only commit if there are staged changes
          git diff --staged --quiet \
            && echo "No data changes — skipping commit" \
            || git commit -m "chore(data): refresh live signals [skip ci]"
          git push
